name: E2E Tests

on:
  push:
    branches:
      - main
    paths:
      - "ClientApp/**"
      - "App/**"
      - "Modules/**"
      - "SharedLib/**"
      - ".github/workflows/e2e-tests.yml"
  pull_request:
    paths:
      - "ClientApp/**"
      - "App/**"
      - "Modules/**"
      - "SharedLib/**"
      - ".github/workflows/e2e-tests.yml"

permissions:
  checks: write
  pull-requests: write

env:
  CI: true
  # API (matches appsettings.Defaults.Testing.json)
  ConnectionStrings__Database: Host=localhost;Port=5432;Database=postgres;Username=e2e;Password=postgres
  EmailHost__SenderEmail: test@example.com
  EmailHost__SmtpPassword: test-password
  ClientApp__BaseUrl: http://127.0.0.1:5173
  Jwt__SecretKey: super-secret-key-that-is-at-least-100-characters-long-for-testing-purposes-only-do-not-use-in-production
  RefreshTokenCookie__Domain: 127.0.0.1
  RefreshTokenCookie__Secure: "false"
  RefreshTokenCookie__SameSite: Lax
  FeatureFlags__SkipEmailVerification: "true"
  FeatureFlags__UseE2eMocks: "true"
  FoodApi__BaseUrl: http://127.0.0.1:9090
  FoodApi__BaseApiUrl: http://127.0.0.1:9090
  E2E_FOOD_API_URL: http://127.0.0.1:9090
  SupaBase__Url: https://test.supabase.co
  SupaBase__Key: test-key
  YoutubeApi__ApiKey: somerandomkey
  YoutubeApi__PipedApiBaseUrl: http://localhost:8080
  YoutubeApi__PipedProxyBaseUrl: http://localhost:8081
  YoutubeApi__PipedFrontendBaseUrl: http://localhost:3000
  Stripe__SecretKey: sk_test_1234567890
  Stripe__WebhookSecret: whsec_1234567890
  Stripe__ProPriceIdMonthly: price_1234567890
  Stripe__ProPriceIdYearly: price_1234567890
  # Playwright / Vite
  E2E_EMAIL: ci-e2e@example.com
  E2E_PASSWORD: TestPass123!
  E2E_FIRST_NAME: CI
  E2E_LAST_NAME: E2E

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: e2e
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U e2e -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ClientApp/package-lock.json

      - name: Restore and build backend
        run: |
          dotnet restore
          dotnet build --no-restore

      - name: Install frontend dependencies
        working-directory: ClientApp
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ClientApp
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: ClientApp
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: ClientApp/playwright-report/
          retention-days: 7

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: ClientApp/test-results/
          retention-days: 7
